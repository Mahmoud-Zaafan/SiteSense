# BoT-SORT tracker config for Construction Equipment Monitoring
# Video is 60fps — frame_rate MUST match or track retention time is wrong
#
# BoxMOT expects this dict format: {type, default, range/options}
# It extracts the "default" value via: details["default"]

track_high_thresh:
  type: uniform
  default: 0.5
  range: [0.3, 0.7]

track_low_thresh:
  type: uniform
  default: 0.08
  range: [0.05, 0.3]

new_track_thresh:
  type: uniform
  default: 0.5
  range: [0.1, 0.8]

track_buffer:
  type: randint
  default: 600
  range: [20, 800]

match_thresh:
  type: uniform
  default: 0.85
  range: [0.1, 0.9]

proximity_thresh:
  type: uniform
  default: 0.5
  range: [0.25, 0.75]

appearance_thresh:
  type: uniform
  default: 0.4
  range: [0.1, 0.8]

cmc_method:
  type: choice
  default: ecc
  options: [sof, ecc]

frame_rate:
  type: randint
  default: 60
  range: [1, 120]
